<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>LeetCode Sync Dashboard</title>
  <style>
    body {
      font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
      background: #0f172a;
      color: #e2e8f0;
      margin: 0;
      padding: 20px;
      display: flex;
      justify-content: center;
      min-height: 100vh;
    }
    .container {
      width: 100%;
      max-width: 450px;
    }
    h2 { font-size: 1.2rem; color: #6366f1; margin: 20px 0 10px 0; }
    h2:first-child { margin-top: 0; }
    .card {
      background: #1e293b;
      padding: 12px;
      border-radius: 8px;
      margin-bottom: 12px;
      border: 1px solid #334155;
    }
    label { display: block; font-size: 0.8rem; margin-bottom: 4px; color: #94a3b8; }
    input, button {
      width: 100%;
      padding: 8px;
      border-radius: 4px;
      border: 1px solid #334155;
      background: #0f172a;
      color: white;
      box-sizing: border-box;
      margin-bottom: 8px;
    }
    button {
      background: #6366f1;
      border: none;
      font-weight: bold;
      cursor: pointer;
    }
    button:hover { background: #4f46e5; }
    .problem-card {
      border-left: 3px solid #6366f1;
      padding-left: 10px;
      margin-bottom: 15px;
    }
    .problem-card h3 { font-size: 0.95rem; margin: 0; }
    .problem-card p { font-size: 0.8rem; color: #cbd5e1; }
    .problem-card small { color: #64748b; }
  </style>
</head>
<body>
  <div class="container">
    <h2>Settings</h2>
    <div class="card">
      <label>GitHub Token</label>
      <input type="password" id="token" placeholder="ghp_xxx">
      <label>GitHub Repo (user/repo)</label>
      <input type="text" id="repo" placeholder="sahanipriyanshu/Test-Repo-">
      <label>OpenAI API Key</label>
      <input type="password" id="openai" placeholder="sk-...">
      <label style="display: flex; align-items: center; gap: 8px;">
        <input type="checkbox" id="sync" style="width: auto; margin: 0;"> Enable Sync
      </label>
      <button id="save">Save Settings</button>
    </div>

    <h2>Solved Problems</h2>
    <div id="list"></div>
  </div>

  <script type="module" src="dashboard.js"></script>
</body>
</html>
